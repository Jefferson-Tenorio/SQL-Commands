services:
  # ===========================================================================
  # 1. BANCO DE DADOS: PostgreSQL com extensões analíticas
  # ===========================================================================
  db:
    build: ./postgreconf
    container_name: badass_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: lab_dados
      PGDATA: /var/lib/postgresql/data/pgdata  # <-- ADICIONE ESTA LINHA     
    command: postgres -c logging_collector=off -c log_destination=stderr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialização: schema + dados base
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - postgres_log:/var/lib/postgresql/data/log

    restart: always
    healthcheck:
      # Verifica se o servidor responde E se consegue executar query
      test: >
        bash -c "
          pg_isready -U postgres -d lab_dados && 
          psql -U postgres -d lab_dados -c 'SELECT 1' -q -t -A 2>/dev/null | grep -q '1'
        "
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s  # Tempo extra para initdb + scripts
    networks:
      - lab-network

  # ===========================================================================
  # 2. ADMINISTRAÇÃO: pgAdmin para exploração visual
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: badass_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lab.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lab-network

  # ===========================================================================
  # 3. GERADOR DE DADOS: Popula o banco com cenários realistas
  # ===========================================================================
  data-generator:
    build: ./data-generator
    container_name: badass_generator
    # ---------------------------------------------------------
    # 🎯 A MÁGICA ACONTECE AQUI
    # ---------------------------------------------------------
    profiles: 
      - setup   # Define que este serviço pertence ao perfil "setup"
    
    restart: "no" # IMPERATIVO: Data Generators rodam uma vez e morrem. Não use 'always'!
    # ---------------------------------------------------------
    
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: lab_dados
      DB_USER: postgres
      DB_PASSWORD: root
      # Variáveis do Script Caótico
      NUM_CUSTOMERS: 1000
      NUM_ORDERS: 5000
    volumes:
      - ./data-generator/scripts:/app
    depends_on:
      db:
        condition: service_healthy # Garante que o banco está pronto antes de tentar inserir
    networks:
      - lab-network

  # ===========================================================================
  # 4. LABORATÓRIO: Jupyter com stack completo SQL + Pandas
  # ===========================================================================
  lab:
    build: ./jupyter-custom
    container_name: badass_jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: dados
      JUPYTER_ENABLE_LAB: "yes"
      # Conexão automática com Postgres
      DATABASE_URL: postgresql://postgres:root@db:5432/lab_dados  # <-- CONFIRME QUE EXISTE!
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data  # Acesso aos dados gerados
    depends_on:
      db:
        condition: service_healthy  # Só inicia quando db estiver 100% pronto
    networks:
      - lab-network

  # ===========================================================================
  # 5. CACHE: Redis para estudos de performance (Opcional)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: badass_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lab-network

volumes:
  postgres_log:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  lab-network:
    driver: bridge