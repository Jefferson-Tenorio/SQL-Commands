services:
  postgres:
    build: ./postgres
    container_name: lab-postgres
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data 
      - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' -q -t -A 2>/dev/null | grep -q '1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - lab

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: lab-pgadmin
    env_file: .env
    ports:
      - "5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lab

  data-generator:
    build: ./data-generator
    container_name: lab-generator
    profiles:
      - setup
    restart: "no"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      NUM_CUSTOMERS: 1000
      NUM_ORDERS: 5000
    volumes:
      - ./data-generator/scripts:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lab

  jupyter:
    build: ./jupyter
    container_name: lab-jupyter
    ports:
      - "8888:8888"
    env_file: .env
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
      - ./jupyter/data:/home/jovyan/data 
    restart: unless-stopped  
    depends_on:
      postgres:
        condition: service_healthy 
    networks:
      - lab

  redis:
    image: redis:7-alpine
    container_name: lab-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis:/data
    networks:
      - lab

volumes:
  pgdata:
  pgadmin:
  redis:

networks:
  lab:
    driver: bridge